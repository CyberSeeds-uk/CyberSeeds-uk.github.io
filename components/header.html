<style>
  .cs-site-header{
    position:sticky;
    top:0;
    z-index:1000;
    padding:20px 16px 12px;
    background:transparent;
  }

  .cs-header-shell{
    width:min(1120px, calc(100% - 0px));
    margin:0 auto;
    padding:14px 18px;
    border:1px solid rgba(19,33,30,.10);
    border-radius:22px;
    background:rgba(255,255,255,.92);
    box-shadow:0 10px 30px rgba(19,33,30,.06);
    backdrop-filter:blur(10px);
    -webkit-backdrop-filter:blur(10px);
  }

  .cs-header-bar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:18px;
  }

  .cs-brand{
    display:flex;
    align-items:center;
    gap:12px;
    min-width:0;
    text-decoration:none;
    color:#13211e;
  }

  .cs-brand-logo{
    width:36px;
    height:36px;
    object-fit:contain;
    display:block;
    flex:0 0 auto;
    border-radius:10px;
  }

  .cs-brand-text{
    display:flex;
    flex-direction:column;
    min-width:0;
  }

  .cs-brand-name{
    font-size:1rem;
    font-weight:700;
    line-height:1.1;
    letter-spacing:-0.01em;
    color:#13211e;
  }

  .cs-brand-tag{
    font-size:.82rem;
    line-height:1.2;
    color:#5a6965;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }

  .cs-header-nav-wrap{
    display:flex;
    align-items:center;
    gap:12px;
    margin-left:auto;
  }

  .cs-primary-nav{
    display:flex;
    align-items:center;
    gap:8px;
    flex-wrap:wrap;
  }

  .cs-nav-link,
  .cs-mobile-link{
    text-decoration:none;
    color:#20332f;
    font-weight:500;
    padding:10px 14px;
    border-radius:12px;
    border:1px solid transparent;
    transition:background-color .18s ease, color .18s ease, border-color .18s ease;
  }

  .cs-nav-link:hover,
  .cs-mobile-link:hover{
    background:#eef7f6;
    border-color:rgba(19,33,30,.08);
  }

  .cs-nav-link[aria-current="page"],
  .cs-mobile-link[aria-current="page"]{
    background:#eef7f6;
    border-color:rgba(19,33,30,.14);
    color:#13211e;
    font-weight:650;
  }

  .cs-audit-cta,
  .cs-mobile-audit{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    text-decoration:none;
    font-weight:700;
    border-radius:14px;
    padding:12px 18px;
    background:#1d5c4e;
    color:#ffffff;
    border:1px solid transparent;
    white-space:nowrap;
    transition:transform .18s ease, opacity .18s ease, filter .18s ease;
  }

  .cs-audit-cta:hover,
  .cs-mobile-audit:hover{
    transform:translateY(-1px);
    opacity:.97;
    filter:brightness(.99);
  }

  .cs-audit-cta[aria-current="page"],
  .cs-mobile-audit[aria-current="page"]{
    background:#1d5c4e;
    color:#ffffff;
  }

  .cs-menu-toggle{
    display:none;
    align-items:center;
    justify-content:center;
    width:46px;
    height:46px;
    border:1px solid rgba(19,33,30,.14);
    border-radius:12px;
    background:#ffffff;
    cursor:pointer;
    padding:0;
    flex:0 0 auto;
  }

  .cs-menu-toggle span{
    display:block;
    width:20px;
    height:2px;
    background:#13211e;
    margin:5px auto;
    border-radius:999px;
    transition:transform .2s ease, opacity .2s ease;
  }

  .cs-menu-toggle.is-open span:nth-child(1){
    transform:translateY(7px) rotate(45deg);
  }

  .cs-menu-toggle.is-open span:nth-child(2){
    opacity:0;
  }

  .cs-menu-toggle.is-open span:nth-child(3){
    transform:translateY(-7px) rotate(-45deg);
  }

  .cs-mobile-panel{
    display:none;
    margin-top:12px;
    padding-top:12px;
    border-top:1px solid rgba(19,33,30,.08);
  }

  .cs-mobile-panel.is-open{
    display:block;
  }

  .cs-mobile-nav{
    display:grid;
    gap:8px;
  }

  .cs-mobile-link{
    background:#ffffff;
    border-color:rgba(19,33,30,.08);
  }

  .cs-mobile-audit{
    margin-top:4px;
  }

  @media (max-width: 860px){
    .cs-site-header{
      padding:12px 10px 10px;
    }

    .cs-header-shell{
      padding:12px 14px;
      border-radius:20px;
    }

    .cs-header-nav-wrap{
      display:none;
    }

    .cs-menu-toggle{
      display:inline-flex;
      flex-direction:column;
    }

    .cs-brand-logo{
      width:40px;
      height:40px;
    }

    .cs-brand-name{
      font-size:1rem;
    }

    .cs-brand-tag{
      max-width:180px;
      font-size:.8rem;
    }
  }

  @media (max-width: 520px){
    .cs-header-shell{
      padding:10px 12px;
    }

    .cs-brand{
      gap:10px;
    }

    .cs-brand-logo{
      width:36px;
      height:36px;
    }

    .cs-brand-tag{
      max-width:150px;
    }
  }
</style>

<header class="cs-site-header">
  <div class="cs-header-shell">
    <div class="cs-header-bar">
      <a href="/" class="cs-brand" aria-label="Cyber Seeds home">
        <img src="/cyber_seeds_logo.png" alt="Cyber Seeds logo" class="cs-brand-logo" />
        <div class="cs-brand-text">
          <span class="cs-brand-name">Cyber Seeds</span>
          <span class="cs-brand-tag">Digital safety for families</span>
        </div>
      </a>

      <div class="cs-header-nav-wrap">
        <nav class="cs-primary-nav" aria-label="Primary navigation">
          <a href="/" class="cs-nav-link" data-nav="home">Home</a>
          <a href="/snapshot/" class="cs-nav-link" data-nav="snapshot">Snapshot</a>
          <a href="/resources/" class="cs-nav-link" data-nav="resources">Resources</a>
          <a href="/contact/" class="cs-nav-link" data-nav="contact">Contact</a>
        </nav>

        <a href="/book/" class="cs-audit-cta" data-nav="book">Book Audit</a>
      </div>

      <button
        class="cs-menu-toggle"
        type="button"
        aria-expanded="false"
        aria-controls="cs-mobile-panel"
        aria-label="Open site navigation"
      >
        <span></span>
        <span></span>
        <span></span>
      </button>
    </div>

    <div id="cs-mobile-panel" class="cs-mobile-panel" hidden>
      <nav class="cs-mobile-nav" aria-label="Mobile navigation">
        <a href="/" class="cs-mobile-link" data-nav="home">Home</a>
        <a href="/snapshot/" class="cs-mobile-link" data-nav="snapshot">Snapshot</a>
        <a href="/resources/" class="cs-mobile-link" data-nav="resources">Resources</a>
        <a href="/contact/" class="cs-mobile-link" data-nav="contact">Contact</a>
        <a href="/book/" class="cs-mobile-audit" data-nav="book">Book Audit</a>
      </nav>
    </div>
  </div>
</header>
