<!DOCTYPE html>
<html lang="en-GB">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#13211e" />
  <title>Book Your Home Cyber Audit | Cyber Seeds</title>
  <meta name="description" content="Book a calm, one-to-one Cyber Seeds home cyber audit for your household." />
  <link rel="icon" href="/cyber_seeds_logo.png" />
  <link rel="canonical" href="https://cyberseeds.co.uk/book/" />
  <link rel="stylesheet" href="/snapshot-app.css" />
</head>
<body>
  <div id="header"></div>

  <main class="intake-main" id="main-content">
    ...
  </main>

  <div id="footer"></div>

  <script src="/shared/email-drafts.js"></script>
  <script>
    (function () {
      const btn = document.getElementById("book-audit-email");
      const status = document.getElementById("book-email-status");
      if (!btn) return;

      const SNAPSHOT_KEY = "cyberseeds_snapshot_latest_v3";

      function safeParse(value) {
        try {
          return JSON.parse(value);
        } catch {
          return null;
        }
      }

      function readLatestSnapshot() {
        try {
          const raw = localStorage.getItem(SNAPSHOT_KEY);
          if (!raw) return null;
          return safeParse(raw);
        } catch (err) {
          console.error("Could not read latest snapshot:", err);
          return null;
        }
      }

      btn.addEventListener("click", function () {
        const snapshot = readLatestSnapshot();

        if (!window.CSEmailDrafts || typeof window.CSEmailDrafts.openBookingDraft !== "function") {
          console.error("CSEmailDrafts is not available.");
          if (status) {
            status.textContent = "The email tool could not be loaded. Please refresh the page and try again.";
          }
          return;
        }

        if (status) {
          status.textContent = snapshot
            ? "Opening your email app with your latest snapshot included."
            : "Opening your email app.";
        }

        window.CSEmailDrafts.openBookingDraft(snapshot);
      });
    })();
  </script>
  <script src="/js/layout.js"></script>
</body>
</html>
