<!DOCTYPE html>
<html lang="en-GB">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#13211e" />
  <title>Cyber Seeds | Household Resources</title>
  <meta
    name="description"
    content="See your household signal, understand what each area means, and find calm next steps for home digital life."
  />
  <link rel="icon" href="/cyber_seeds_logo.png" />
  <link rel="canonical" href="https://cyberseeds.co.uk/resources/" />
  <link rel="stylesheet" href="/snapshot-app.css" />

  <style>
    .cs-lensRow{
      border:1px solid var(--line);
      border-radius:14px;
      background:#fff;
      overflow:clip;
      margin:12px 0;
    }

    .cs-lensToggle{
      width:100%;
      text-align:left;
      border:0;
      background:transparent;
      padding:14px;
      display:grid;
      grid-template-columns:140px 1fr;
      gap:14px;
      align-items:start;
      cursor:pointer;
    }

    .cs-lensLeft{
      display:grid;
      gap:4px;
    }

    .cs-lensName{
      font-weight:650;
      color:var(--ink);
      line-height:1.2;
    }

    .cs-lensScore{
      color:var(--muted);
      font-size:.95rem;
      line-height:1.2;
    }

    .cs-lensRight{
      display:grid;
      gap:6px;
      min-width:0;
    }

    .cs-lensBand{
      font-weight:650;
      font-size:.85rem;
      color:var(--brand2);
    }

    .cs-lensSummary{
      color:var(--muted);
      font-size:.95rem;
      line-height:1.45;
    }

    .cs-lensDetails{
      border-top:1px solid var(--line);
      background:var(--mint2);
      padding:14px 14px 16px;
    }

    .cs-lensInterpretation,
    .cs-lensDirection{
      margin:0 0 10px;
      line-height:1.55;
      color:var(--ink);
    }

    .cs-lensDirection{
      margin-bottom:0;
    }

    .cs-lensToggle:focus-visible{
      outline:3px solid rgba(26,106,93,.35);
      outline-offset:2px;
      border-radius:12px;
    }

    .cs-lensRow--focus{
      border-color:rgba(15,47,42,.35);
      box-shadow:0 1px 0 rgba(15,47,42,.08);
    }

    .snapshot-controls{
      margin-top:12px;
      display:grid;
      gap:10px;
    }

    .snapshot-controls p,
    .snapshot-controls label{
      margin:0;
      line-height:1.5;
    }

    .snapshot-controls input[type="file"]{
      width:100%;
      max-width:100%;
      border:1px solid var(--line);
      border-radius:12px;
      background:#fff;
      padding:10px 12px;
      box-sizing:border-box;
    }

    .renewal-actions{
      padding:18px;
    }

    .renewal-actions-grid{
      display:grid;
      grid-template-columns:repeat(2, minmax(0, 1fr));
      gap:12px;
    }

    .renewal-actions button,
    .renewal-actions a{
      min-height:48px;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
    }

    .compact-progress-card{
      margin-top:14px;
      padding:18px;
    }

    .compact-progress-head{
      display:grid;
      gap:4px;
    }

    .compact-progress-head h2{
      margin:0;
      font-size:1.05rem;
    }

    .compact-progress-summary{
      margin:0;
      color:var(--muted);
      line-height:1.45;
      font-size:.97rem;
    }

    .compact-progress-details{
      margin-top:12px;
      border-top:1px solid var(--line);
      padding-top:12px;
    }

    .compact-progress-details summary{
      cursor:pointer;
      list-style:none;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      color:var(--ink);
      font-weight:650;
      user-select:none;
    }

    .compact-progress-details summary::-webkit-details-marker{
      display:none;
    }

    .compact-progress-details summary::after{
      content:"+";
      font-weight:700;
      color:var(--muted);
      line-height:1;
    }

    .compact-progress-details[open] summary::after{
      content:"–";
    }

    .compact-progress-actions{
      display:grid;
      gap:10px;
      margin-top:12px;
      padding-top:2px;
    }

    .compact-progress-actions .btn-secondary{
      min-height:44px;
    }

    .compact-progress-actions p{
      margin:0;
      color:var(--muted);
      line-height:1.45;
      font-size:.95rem;
    }

    .compact-progress-actions #baselineStatus{
      min-height:1.2em;
    }

    .resultCard.snapshot-controls{
      margin-top:14px;
      padding:18px;
    }

    .resultCard.snapshot-controls details{
      display:grid;
      gap:10px;
    }

    .resultCard.snapshot-controls summary{
      cursor:pointer;
      list-style:none;
      font-weight:650;
      color:var(--ink);
      user-select:none;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
    }

    .resultCard.snapshot-controls summary::-webkit-details-marker{
      display:none;
    }

    .resultCard.snapshot-controls summary::after{
      content:"+";
      font-weight:700;
      color:var(--muted);
      line-height:1;
    }

    .resultCard.snapshot-controls details[open] summary::after{
      content:"–";
    }

    .resultCard.snapshot-controls button{
      width:fit-content;
      min-height:44px;
      padding-inline:18px;
    }

    .resultCard.snapshot-controls .muted{
      min-height:1.2em;
    }

    @media (max-width:640px){
      .cs-lensToggle{
        grid-template-columns:1fr;
      }

      .cs-lensLeft{
        grid-template-columns:1fr auto;
        align-items:baseline;
      }

      .cs-lensScore{
        justify-self:end;
      }

      .renewal-actions-grid{
        grid-template-columns:1fr;
      }

      .renewal-actions .btn-secondary,
      .renewal-actions .btn-primary{
        width:100%;
      }

      .resultCard.snapshot-controls button{
        width:100%;
      }
    }
    .lens-breakdown-hint{
      margin:6px 0 14px;
      color:var(--muted);
      line-height:1.5;
      font-size:.97rem;
    }
    
    .cs-lensToggle{
      position:relative;
      transition:background .18s ease, border-color .18s ease, transform .12s ease;
    }
    
    .cs-lensToggle:hover{
      background:#f8fcfb;
    }
    
    .cs-lensToggle[aria-expanded="true"]{
      background:#fbfefd;
    }
    
    .cs-lensTopline{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
    }
    
    .cs-lensCue{
      display:inline-flex;
      align-items:center;
      gap:8px;
      color:var(--brand2);
      font-size:.88rem;
      font-weight:650;
      white-space:nowrap;
    }
    
    .cs-lensChevron{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      width:24px;
      height:24px;
      border:1px solid var(--line);
      border-radius:999px;
      background:#fff;
      color:var(--ink);
      font-weight:700;
      line-height:1;
    }
    
    .cs-lensToggle[aria-expanded="true"] .cs-lensChevron{
      background:var(--mint2);
      border-color:rgba(15,47,42,.18);
    }
    
    .cs-lensDetails{
      animation:csLensOpen .18s ease;
    }
    
    @keyframes csLensOpen{
      from{opacity:0; transform:translateY(-4px);}
      to{opacity:1; transform:translateY(0);}
    }
    
    @media (max-width:640px){
      .cs-lensTopline{
        align-items:flex-start;
        flex-direction:column;
      }
    
      .cs-lensCue{
        font-size:.84rem;
      }
    }
    .trajectory-container{
      margin-top:22px;
    }
    
    .renewal-actions{
      margin-top:18px;
      display:grid;
      grid-template-columns:repeat(3, minmax(0, 1fr));
      gap:12px;
    }
    
    .renewal-actions .btn-secondary,
    .renewal-actions .btn-primary{
      min-height:48px;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
    }
    
    @media (max-width:760px){
      .renewal-actions{
        grid-template-columns:1fr;
      }
    }
  </style>
</head>
<body>
  <div id="header"></div>

  <main class="resource-main" id="resourcesRoot" aria-live="polite">
    <noscript>
      <section class="resource-panel">
        <p class="kicker">Resources</p>
        <h1>JavaScript needs to be turned on for this page</h1>
        <p>
          This page uses your saved Household Snapshot on this device to show your household signal,
          your five areas, and your next calm steps.
        </p>
        <p>
          <a class="btn-primary" href="/snapshot/">Go to the Household Snapshot</a>
        </p>
      </section>
    </noscript>
  </main>

  <div id="footer"></div>

  <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
  <script src="/shared/email-drafts.js"></script>
  <script src="/shared/snapshot-report.js"></script>
  <script src="/snapshot/trajectory.js"></script>
  <script type="module" src="/resources/resources-hub.js"></script>
  <script src="/js/layout.js"></script>
</body>
</html>
